{% extends 'gallery/base.html' %}

{% block content %}
<style>
  .link-detail-container {
    max-width: 600px;
    margin: 60px auto;
    background-color: #f9f6ff;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 8px 8px 20px #d4c2ec, -8px -8px 20px #ffffff;
    text-align: center;
    font-family: 'Segoe UI', sans-serif;
  }

  .link-detail-container h2 {
    color: #4b3f72;
    margin-bottom: 20px;
  }

  .link-detail-container p {
    font-size: 1.1em;
    color: #444;
    margin-bottom: 20px;
  }

  .visit-link {
    text-decoration: none;
    color: #5c5470;
    margin: 0 10px;
    padding: 10px 20px;
    background: #e0e5ec;
    border-radius: 10px;
    box-shadow: inset 6px 6px 12px #c5c9d1, inset -6px -6px 12px #fbffff;
    transition: all 0.3s ease;
    
  }

  .visit-link:hover {
    box-shadow: 6px 6px 12px #c5c9d1, -6px -6px 12px #fbffff;
    color: #7f3d7f;
    decoration: none;
  }

  .back-link {
    display: inline-block;
    margin-top: 25px;
    text-decoration: none;
    color: #4b3f72;
    font-weight: bold;
  }

  .back-link:hover {
    text-decoration: underline;
  }
</style>

<div class="link-detail-container">
  <h2>{{ link.title }}</h2>

  {% if link.description %}
    <p>{{ link.description }}</p>
  {% endif %}

  <a href="{{ link.url }}" target="_blank" class="visit-link">
    Visit Link 🔗
  </a>

  <br />
  <a href="{% url 'links' %}" class="back-link">&larr; Back to Links</a>
</div>
{% endblock %}
